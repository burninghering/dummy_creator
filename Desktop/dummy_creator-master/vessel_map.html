<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polygon Visualization</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <style>
        #map {
            height: 600px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script>
        // 지도를 초기화하고 구룡포 근처로 초기 위치 설정
        var map = L.map('map').setView([35.987, 129.559], 14);

        // OSM 지도 타일 추가
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 19,
        }).addTo(map);

        // 첫 번째 다각형
        var polygon1 = [
[
 [35.989301, 129.559683],  // 첫 번째 꼭짓점
    [35.990568, 129.557613],
    [35.990018, 129.555920],
    [35.989333, 129.556572],
    [35.988770, 129.555796],
    [35.989203, 129.555154],
    [35.987217, 129.552773],
    [35.985626, 129.552162],
    [35.983288, 129.555102],
    [35.986041, 129.560725],
    [35.983321, 129.559852],
    [35.978506, 129.553306],
    [35.969736, 129.555431],
    [35.986004, 129.572315],
    [35.988819, 129.561302],
    [35.986642, 129.558267],
    [35.985553, 129.558330],
    [35.985502, 129.557610],
    [35.987199, 129.556984],
    [35.987072, 129.557047],
    [35.989301, 129.559683],

]

    
        ];

        // 두 번째 다각형
        var polygon2 = [
            [35.985971, 129.560514],
            [35.982260, 129.554129],
            [35.980280, 129.555223],
            [35.985690, 129.560659]
        ];

        // 다각형을 지도에 추가
        L.polygon(polygon1, {color: 'blue'}).addTo(map).bindPopup("Restricted Area 1");
        L.polygon(polygon2, {color: 'red'}).addTo(map).bindPopup("Restricted Area 2");
    </script>
</body>
</html>
